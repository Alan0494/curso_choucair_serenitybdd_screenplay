environments {
        default {
            webdriver.base.url = "https://www.saucedemo.com"
        }
    }

    serenity {
        enconding = "UTF-8"
        project.name = "bintec_ejemplo"
        test.root = "com.bintec.ejemplo"
        take.screenshots = BEFORE_AND_AFTER_EACH_STEP
        logging = VERBOSE
        restart.browser.for.each = scenario
    }

    webdriver {
        driver = chrome
        auto.download=true
        timeouts {
            implicitlywait = 10000
        }
        capabilities {
            "goog:chromeOptions" {
                args = ["--no-sandbox", "--lang=es", "--incognito", "--disable-download-notification",
                        "--start-maximized", "--test-type", "--ignore-certificate-errors",
                        "--allow-running-insecure-content", "--disable-translate",
                        "--always-authorize-plugins"]
            }
        }
    }

    logging.level.root = INFO
    logging.level.net.serenitybdd = INFO